<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สอบปากเปล่า ชีววิทยา บทที่ 1</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=Mitr:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#2d6a4f;--g2:#40916c;--gp:#d8f3dc;
  --y:#ffd166;--or:#f4a261;--red:#e63946;--blue:#457b9d;
  --bg:#f0faf4;--white:#fff;--text:#1b1b1b;
  --r:14px;--sh:0 4px 20px rgba(0,0,0,.12)
}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:.8rem 1rem 4rem}
h1,h2,h3,h4{font-family:'Mitr',sans-serif}
.screen{width:100%;max-width:580px;display:none}
.screen.active{display:block}

/* LANG BAR */
.lang-bar{
  width:100%;max-width:580px;
  display:flex;gap:.4rem;margin-bottom:.6rem;margin-top:.4rem;
}
.lang-btn{
  flex:1;padding:.45rem .3rem;border:2px solid #cce5d8;border-radius:8px;
  background:#fff;font-size:.88rem;font-weight:700;cursor:pointer;
  text-align:center;transition:.15s;color:var(--g);
}
.lang-btn.active{background:var(--g);color:#fff;border-color:var(--g)}

/* NAV BAR */
.nav-bar{
  width:100%;max-width:580px;
  display:flex;gap:.4rem;margin-bottom:.8rem;
  background:var(--white);border-radius:12px;
  box-shadow:var(--sh);padding:.5rem;
}
.nav-btn{
  flex:1;padding:.5rem .3rem;border:none;border-radius:8px;
  font-family:'Mitr',sans-serif;font-size:.82rem;font-weight:700;
  cursor:pointer;background:transparent;color:#888;transition:.15s;
}
.nav-btn.active{background:var(--g);color:#fff}

/* CARDS */
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:1.6rem;margin-bottom:1rem}
.logo-row{text-align:center;margin-bottom:.8rem}
.logo-row .em{font-size:2.8rem}
.logo-row h1{color:var(--g);font-size:1.4rem;margin:.2rem 0 .1rem}
.logo-row p{font-size:.83rem;color:#666}
.field-label{font-size:.82rem;font-weight:700;color:var(--g);margin-bottom:.4rem;display:block}

/* TABS */
.tab-row{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap}
.tab{flex:1;min-width:55px;padding:.5rem .3rem;border:2px solid #cce5d8;border-radius:9px;
  background:#fff;font-family:'Mitr',sans-serif;font-size:.86rem;font-weight:700;
  color:var(--g);cursor:pointer;text-align:center;transition:.15s}
.tab.active-cls{background:var(--blue);color:#fff;border-color:var(--blue)}
.tab.active-grp{background:var(--g);color:#fff;border-color:var(--g)}

/* MEMBERS */
.members-wrap{background:#f9fffe;border:1.5px solid #cce5d8;border-radius:11px;padding:.9rem;margin-bottom:1rem}
.members-wrap h3{color:var(--g);font-size:.88rem;margin-bottom:.6rem}
.member-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.45rem}
.mem-num{width:24px;height:24px;border-radius:50%;background:var(--g);color:#fff;
  font-size:.68rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mem-inp{flex:1;padding:.44rem .7rem;border:1.5px solid #cce5d8;border-radius:8px;
  font-family:'Sarabun',sans-serif;font-size:.86rem;outline:none;transition:border .15s}
.mem-inp:focus{border-color:var(--g2)}
.mem-inp::placeholder{color:#ccc}
.absent-row{display:flex;align-items:center;gap:.4rem;margin-top:.15rem;padding-left:32px}
.absent-row label{font-size:.75rem;color:#888}
.mem-absent-cb{accent-color:var(--red)}

/* BUTTONS */
.btn{padding:.75rem 1.4rem;border:none;border-radius:10px;font-family:'Mitr',sans-serif;
  font-size:.95rem;font-weight:700;cursor:pointer;transition:.15s}
.btn:hover{transform:translateY(-2px);opacity:.9}
.btn-green{background:var(--g);color:#fff}
.btn-gray{background:#eee;color:#666}
.btn-red{background:var(--red);color:#fff}
.btn-full{width:100%}
.btn-row{display:flex;gap:.6rem}

/* QUIZ */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem;gap:.5rem;flex-wrap:wrap}
.group-chip{background:var(--white);border-radius:999px;padding:.3rem .9rem;font-size:.8rem;font-weight:700;color:var(--g);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.score-chip{background:var(--g);color:#fff;border-radius:999px;padding:.3rem .9rem;font-family:'Mitr',sans-serif;font-size:.92rem;font-weight:800}
.prog-wrap{background:#cce5d8;border-radius:999px;height:8px;margin-bottom:.8rem;overflow:hidden}
.prog-bar{background:linear-gradient(90deg,var(--g2),#95d5b2);height:100%;border-radius:999px;transition:width .4s}

.q-badge{display:inline-block;background:var(--gp);color:var(--g);font-size:.7rem;font-weight:800;border-radius:6px;padding:2px 8px;margin-bottom:.4rem}
.q-secname{font-size:.72rem;color:#888;margin-bottom:.35rem}
.scenario-box{background:#fff8ec;border:1.5px solid var(--y);border-left:4px solid var(--or);border-radius:9px;
  padding:.55rem .85rem;margin-bottom:.7rem;font-size:.82rem;line-height:1.7;color:#555}
.scenario-box strong{color:#7a5000}
.q-text{font-size:1.18rem;font-weight:700;line-height:1.65;color:var(--text);margin-bottom:.9rem;min-height:2.6rem}

/* TIMER */
.timer-row{display:flex;justify-content:center;margin-bottom:.8rem}
svg.tsv{width:68px;height:68px}
.tbg{fill:none;stroke:#d8f3dc;stroke-width:7}
.tring{fill:none;stroke:var(--g);stroke-width:7;stroke-linecap:round;stroke-dasharray:188;stroke-dashoffset:0;
  transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset 1s linear,stroke .4s}
.tring.warn{stroke:var(--or)}.tring.danger{stroke:var(--red)}
.tnum{font-family:'Mitr',sans-serif;font-size:1.15rem;font-weight:800;fill:var(--g);text-anchor:middle;dominant-baseline:central}

.ans-box{background:var(--gp);border:2px dashed var(--g2);border-radius:11px;padding:.7rem 1rem;text-align:center;display:none}
.ans-box.show{display:block;animation:popIn .25s}
.ans-label{font-size:.7rem;color:var(--g2);font-weight:700;margin-bottom:3px}
.ans-word{font-family:'Mitr',sans-serif;font-size:1.45rem;font-weight:800;color:var(--g)}

.act-row{display:flex;gap:.5rem;margin-top:.9rem}
.act-row button{flex:1;padding:.75rem;border:none;border-radius:11px;font-family:'Mitr',sans-serif;
  font-size:.92rem;font-weight:700;cursor:pointer;transition:.1s}
.act-row button:hover{transform:translateY(-2px)}
.btn-show{background:var(--y);color:#5a3e00}
.btn-ok{background:var(--g);color:#fff}
.btn-miss{background:var(--red);color:#fff}
.bot-row{display:flex;gap:.5rem;margin-top:.6rem}
.btn-next{flex:1;padding:.68rem;background:var(--blue);color:#fff;border:none;border-radius:11px;
  font-family:'Mitr',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;display:none}
.btn-abort{padding:.68rem 1rem;background:#eee;color:#888;border:none;border-radius:11px;font-size:.8rem;cursor:pointer}

/* MEM TAGS */
.mem-tags-wrap{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.5rem}
.mem-tag{border-radius:999px;padding:.22rem .7rem;font-size:.78rem;font-weight:600}
.mem-tag.present{background:var(--gp);color:var(--g)}
.mem-tag.absent{background:#ffe0e0;color:#c00}

/* SUMMARY */
.group-card{border:1.5px solid #cce5d8;border-radius:10px;padding:.75rem 1rem;margin-bottom:.6rem}
.group-card.complete{border-color:var(--g);background:#f6fdf9}
.group-card.partial{border-color:var(--or);background:#fff9f2}
.group-card.empty{border-color:#ddd;background:#fafafa}
.gc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;flex-wrap:wrap;gap:.3rem}
.gc-title{font-family:'Mitr',sans-serif;font-weight:700;font-size:.92rem}
.gc-badge{font-size:.7rem;font-weight:700;border-radius:999px;padding:2px 9px}
.badge-complete{background:var(--gp);color:var(--g)}
.badge-partial{background:#ffecd6;color:#a05000}
.badge-empty{background:#eee;color:#888}
.badge-score{background:var(--g);color:#fff;font-family:'Mitr',sans-serif;font-size:.82rem;padding:3px 10px;border-radius:999px}
.gc-members{display:flex;flex-wrap:wrap;gap:.3rem}
.gc-mem{font-size:.76rem;border-radius:6px;padding:2px 8px;font-weight:600}
.gc-mem.done{background:var(--gp);color:var(--g)}
.gc-mem.pending{background:#ffe0e0;color:#c00}
.empty-state{text-align:center;padding:2rem;color:#bbb;font-size:.9rem}

/* RESULT */
.res-score-box{background:linear-gradient(135deg,var(--g),var(--g2));border-radius:14px;padding:1.1rem;
  margin-bottom:1rem;color:#fff;text-align:center}
.res-score-box .big{font-family:'Mitr',sans-serif;font-size:3.2rem;font-weight:800;line-height:1}
.res-score-box .of{font-size:.9rem;opacity:.85;margin-top:.2rem}
.res-score-box .pct{font-size:1rem;font-weight:700;margin-top:.25rem;opacity:.9}

@keyframes popIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>

<!-- LANG -->
<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('th')">🇹🇭 ไทย</button>
  <button class="lang-btn"        onclick="setLang('en')">🇬🇧 English</button>
  <button class="lang-btn"        onclick="setLang('fr')">🇫🇷 Français</button>
</div>

<!-- NAV -->
<div class="nav-bar">
  <button class="nav-btn active" id="nav-setup"   onclick="goTab('setup')"   data-i18n="nav_exam"></button>
  <button class="nav-btn"        id="nav-summary"  onclick="goTab('summary')" data-i18n="nav_summary"></button>
</div>

<!-- ══ SETUP ══ -->
<div class="screen active" id="setup">
  <div id="setup-form">
    <div class="card">
      <div class="logo-row">
        <div class="em">🌿</div>
        <h1 data-i18n="app_title"></h1>
        <p  data-i18n="app_sub"></p>
      </div>

      <label class="field-label" data-i18n="label_class"></label>
      <div class="tab-row">
        <div class="tab active-cls" id="cls1" onclick="selectClass('ม.4/1')">ม.4/1</div>
        <div class="tab"            id="cls2" onclick="selectClass('ม.4/2')">ม.4/2</div>
      </div>

      <label class="field-label" data-i18n="label_group"></label>
      <div class="tab-row" id="grp-tabs">
        <div class="tab active-grp" onclick="selectGroup(1)" data-i18n-tpl="group_n" data-n="1"></div>
        <div class="tab"            onclick="selectGroup(2)" data-i18n-tpl="group_n" data-n="2"></div>
        <div class="tab"            onclick="selectGroup(3)" data-i18n-tpl="group_n" data-n="3"></div>
        <div class="tab"            onclick="selectGroup(4)" data-i18n-tpl="group_n" data-n="4"></div>
        <div class="tab"            onclick="selectGroup(5)" data-i18n-tpl="group_n" data-n="5"></div>
        <div class="tab"            onclick="selectGroup(6)" data-i18n-tpl="group_n" data-n="6"></div>
      </div>

      <div class="members-wrap">
        <h3 id="members-title"></h3>
        <div id="members-list"></div>
      </div>
      <button class="btn btn-green btn-full" onclick="startExam()" data-i18n="btn_start"></button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz-area" style="display:none">
    <div class="top-bar">
      <div class="group-chip" id="chip-group"></div>
      <div class="score-chip" id="chip-score"></div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
    <div class="card" id="q-card" style="animation:popIn .3s cubic-bezier(.34,1.56,.64,1)">
      <div class="q-badge"   id="q-badge"></div>
      <div class="q-secname" id="q-secname"></div>
      <div id="scenario-wrap"></div>
      <div class="q-text"    id="q-text"></div>
      <div class="timer-row">
        <svg class="tsv" viewBox="0 0 70 70">
          <circle class="tbg"   cx="35" cy="35" r="30"/>
          <circle class="tring" id="tring" cx="35" cy="35" r="30"/>
          <text   class="tnum"  id="tnum"  x="35" y="35">20</text>
        </svg>
      </div>
      <div class="ans-box" id="ans-box">
        <div class="ans-label" data-i18n="ans_label"></div>
        <div class="ans-word"  id="ans-word">—</div>
      </div>
      <div class="act-row" id="phase1">
        <button class="btn-show" onclick="reveal()" data-i18n="btn_reveal"></button>
      </div>
      <div class="act-row" id="phase2" style="display:none">
        <button class="btn-miss" onclick="mark(false)" data-i18n="btn_wrong"></button>
        <button class="btn-ok"   onclick="mark(true)"  data-i18n="btn_correct"></button>
      </div>
      <div class="bot-row">
        <button class="btn-next"  id="btn-next"  onclick="nextQ()" data-i18n="btn_next"></button>
        <button class="btn-abort" onclick="confirmAbort()" data-i18n="btn_abort"></button>
      </div>
    </div>
    <div class="card" style="padding:1rem">
      <div style="font-family:'Mitr',sans-serif;font-size:.82rem;color:var(--g);margin-bottom:.4rem" data-i18n="label_today_members"></div>
      <div class="mem-tags-wrap" id="mem-tags-quiz"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result-area" style="display:none">
    <div class="card">
      <div style="text-align:center">
        <div style="font-size:3rem" id="res-em">🎉</div>
        <h2 style="color:var(--g)" data-i18n="res_saved"></h2>
        <p style="font-size:.85rem;color:#777;margin:.3rem 0 1rem" id="res-sub"></p>
      </div>
      <div class="res-score-box">
        <div class="big" id="res-score">0</div>
        <div class="of"  id="res-of"></div>
        <div class="pct" id="res-pct"></div>
      </div>
      <div style="margin-bottom:.8rem">
        <div class="field-label" data-i18n="res_present"></div>
        <div class="mem-tags-wrap" id="res-present"></div>
      </div>
      <div id="res-absent-wrap" style="margin-bottom:1rem;display:none">
        <div class="field-label" style="color:var(--red)" data-i18n="res_absent"></div>
        <div class="mem-tags-wrap" id="res-absent"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-green" style="flex:1" onclick="goTab('summary')" data-i18n="btn_see_summary"></button>
        <button class="btn btn-gray"  style="flex:1" onclick="backToSetup()"    data-i18n="btn_next_group"></button>
      </div>
    </div>
  </div>
</div>

<!-- ══ SUMMARY ══ -->
<div class="screen" id="summary">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem">
      <h2 style="color:var(--g);font-size:1.1rem" data-i18n="summary_title"></h2>
      <button class="btn btn-red" style="font-size:.75rem;padding:.35rem .8rem" onclick="clearAll()" data-i18n="btn_clear"></button>
    </div>
    <div style="display:flex;gap:.4rem;margin-bottom:.8rem">
      <button class="tab active-cls" id="sum-cls1" onclick="renderSummary('ม.4/1')" style="font-size:.82rem">ม.4/1</button>
      <button class="tab"            id="sum-cls2" onclick="renderSummary('ม.4/2')" style="font-size:.82rem">ม.4/2</button>
    </div>
    <div id="summary-content"></div>
  </div>
</div>

// i18n helpers
// ════════════════════════════
function t(key, vars={}){
  let s=I18N[lang][key]||I18N.th[key]||key;
  Object.entries(vars).forEach(([k,v])=>{ s=s.replaceAll('{'+k+'}',v); });
  return s;
}
function applyI18N(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    el.textContent=t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-tpl]').forEach(el=>{
    el.textContent=t(el.dataset.i18nTpl,{n:el.dataset.n});
  });
  document.getElementById('members-title').innerHTML=
    `${t('members_title')} <span style="font-weight:400;color:#888;font-size:.8rem">${t('members_hint')}</span>`;
  buildMembers();
}

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach((b,i)=>{
    b.classList.toggle('active',['th','en','fr'][i]===l);
  });
  applyI18N();
  if(document.getElementById('summary').classList.contains('active'))
    renderSummary(currentSummaryClass);
}

function loadDB(){ try{return JSON.parse(localStorage.getItem('bio_scores2')||'{}')}catch(e){return{}} }
function saveDB(db){ localStorage.setItem('bio_scores2',JSON.stringify(db)) }
function getGrpDB(cls,grpLabel){
  const db=loadDB();
  if(!db[cls]) db[cls]={};
  if(!db[cls][grpLabel]) db[cls][grpLabel]={allMembers:[],pickedIdx:[],sessions:[]};
  return {db, grp:db[cls][grpLabel]};
}

      <div class="member-row">
        <div class="mem-num">${i}</div>
        <input class="mem-inp" id="mem${i}" type="text" placeholder="${t('mem_placeholder',{n:i})}">
      </div>
      <div class="absent-row">
        <input type="checkbox" class="mem-absent-cb" id="abs${i}">
        <label for="abs${i}">${t('absent_label')}</label>
      </div>`;
  }
}

function selectClass(cls){
  classroom=cls;
  document.getElementById('cls1').classList.toggle('active-cls',cls==='ม.4/1');
  document.getElementById('cls2').classList.toggle('active-cls',cls==='ม.4/2');
}
function selectGroup(n){
  groupNo=n;
  document.querySelectorAll('#grp-tabs .tab')
    .forEach((t,i)=>t.classList.toggle('active-grp',i+1===n));
}

// ════════════════════════════
// START EXAM
// ════════════════════════════
function startExam(){
  allMembers=[]; presentIdxs=[]; absentIdxs=[];
  for(let i=0;i<MAX;i++){
    const v=document.getElementById('mem'+(i+1)).value.trim();
    if(!v) continue;
    const idx=allMembers.length;
    allMembers.push(v);
    if(document.getElementById('abs'+(i+1)).checked) absentIdxs.push(idx);
    else presentIdxs.push(idx);
  }
  if(!allMembers.length){ alert(t('err_no_member')); return; }
  if(!presentIdxs.length){ alert(t('err_no_present')); return; }

  const grpLabel=t('group_n',{n:groupNo});
  const {db,grp}=getGrpDB(classroom,grpLabel);

  if(grp.allMembers.length>0){
    if(grp.allMembers.join(',')!==allMembers.join(',')){
      if(!confirm(t('confirm_reset',{grp:grpLabel}))) return;
      grp.allMembers=[]; grp.pickedIdx=[]; grp.sessions=[];
    }
  }
  if(!grp.allMembers.length){
    grp.allMembers=[...allMembers];
    grp.pickedIdx=shuffle([...Array(QUESTIONS[lang].length).keys()]).slice(0,TOTAL);
    saveDB(db);
  } else {
    allMembers=[...grp.allMembers];
    const inputPresent=new Set();
    for(let i=0;i<MAX;i++){
      const v=document.getElementById('mem'+(i+1)).value.trim();
      if(v&&!document.getElementById('abs'+(i+1)).checked) inputPresent.add(v);
    }
    presentIdxs=[]; absentIdxs=[];
    allMembers.forEach((name,idx)=>{
      if(inputPresent.has(name)) presentIdxs.push(idx);
      else absentIdxs.push(idx);
    });
  }

  pickedQuestions=grp.pickedIdx.map(i=>QUESTIONS[lang][i]);

  const doneQByMember={};
  grp.sessions.forEach(s=>{
    s.answers.forEach(a=>{
      if(!doneQByMember[a.memberIdx]) doneQByMember[a.memberIdx]=new Set();
      doneQByMember[a.memberIdx].add(a.qIdx);
    });
  });

  sessionSlots=[];
  for(let qIdx=0;qIdx<TOTAL;qIdx++){
    const memberIdx=qIdx%allMembers.length;
    const alreadyDone=doneQByMember[memberIdx]&&doneQByMember[memberIdx].has(qIdx);
    if(presentIdxs.includes(memberIdx)&&!alreadyDone)
      sessionSlots.push({memberIdx,qIdx,correct:null});
  }

  if(!sessionSlots.length){ alert(t('err_done')); return; }

  curSlot=0;
  document.getElementById('chip-group').textContent=`${classroom} · ${grpLabel}`;
  renderMemberTags('mem-tags-quiz');
  document.getElementById('setup-form').style.display='none';
  document.getElementById('quiz-area').style.display='block';
  document.getElementById('result-area').style.display='none';
  renderQ();
}

function renderMemberTags(elId, curMemberIdx=-1){
  document.getElementById(elId).innerHTML=
    allMembers.map((n,i)=>{
      const isPresent=presentIdxs.includes(i);
      const isCur=i===curMemberIdx;
      if(isCur) return `<span class="mem-tag" style="background:var(--y);color:#5a3e00;outline:2px solid var(--or)">▶ ${n}</span>`;
      return `<span class="mem-tag ${isPresent?'present':'absent'}">${isPresent?'👤':'⏳'} ${n}</span>`;
    }).join('');
}

// ════════════════════════════
// QUIZ
// ════════════════════════════
function renderQ(){
  const slot=sessionSlots[curSlot];
  const q=pickedQuestions[slot.qIdx];

  document.getElementById('q-badge').textContent=
    t('q_badge',{cur:curSlot+1,total:sessionSlots.length,qn:slot.qIdx+1,qtotal:TOTAL});
  document.getElementById('q-secname').textContent='📌 '+q.sec;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('ans-word').textContent=q.a;
  document.getElementById('ans-box').classList.remove('show');
  document.getElementById('prog-bar').style.width=(slot.qIdx/TOTAL*100)+'%';

  document.getElementById('scenario-wrap').innerHTML=q.scenario
    ?`<div class="scenario-box"><strong>${t('scenario_label')} :</strong> ${q.scenario}</div>`:'';

  document.getElementById('phase1').style.display='flex';
  document.getElementById('phase2').style.display='none';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('btn-next').textContent=t('btn_next');

  updateScoreChip();
  renderMemberTags('mem-tags-quiz', slot.memberIdx);

  const c=document.getElementById('q-card');
  c.style.animation='none'; c.offsetHeight; c.style.animation='popIn .3s cubic-bezier(.34,1.56,.64,1)';
  startTimer();
}

function updateScoreChip(){
  const done=sessionSlots.slice(0,curSlot).filter(s=>s.correct===true).length;
  document.getElementById('chip-score').textContent=
    t('chip_score',{done,total:sessionSlots.length});
}

function startTimer(){
  clearInterval(timerID); timeLeft=SECS; updateRing();
  timerID=setInterval(()=>{timeLeft--;updateRing();if(timeLeft<=0){clearInterval(timerID);reveal();}},1000);
}
function updateRing(){
  const r=document.getElementById('tring'),n=document.getElementById('tnum');
  r.style.strokeDashoffset=DASH*(1-timeLeft/SECS);
  n.textContent=timeLeft;
  r.className='tring'+(timeLeft<=5?' danger':timeLeft<=10?' warn':'');
}

function reveal(){
  clearInterval(timerID);
  document.getElementById('ans-box').classList.add('show');
  document.getElementById('phase1').style.display='none';
  document.getElementById('phase2').style.display='flex';
}
function mark(ok){
  sessionSlots[curSlot].correct=ok;
  document.getElementById('phase2').style.display='none';
  document.getElementById('btn-next').style.display='block';
  updateScoreChip();
  if(curSlot+1>=sessionSlots.length)
    document.getElementById('btn-next').textContent=t('btn_finish');
}
function nextQ(){
  curSlot++;
  if(curSlot>=sessionSlots.length){ finishExam(); return; }
  renderQ();
}

// ════════════════════════════
// FINISH
// ════════════════════════════
function finishExam(){
  clearInterval(timerID);
  const grpLabel=t('group_n',{n:groupNo});
  const {db,grp}=getGrpDB(classroom,grpLabel);
  const date=new Date().toLocaleString('th-TH',{dateStyle:'short',timeStyle:'short'});
  grp.sessions.push({
    answers:sessionSlots.map(s=>({memberIdx:s.memberIdx,qIdx:s.qIdx,correct:s.correct})),
    presentNames:presentIdxs.map(i=>allMembers[i]),
    absentNames:absentIdxs.map(i=>allMembers[i]),
    date, lang
  });
  saveDB(db);

  document.getElementById('quiz-area').style.display='none';
  document.getElementById('result-area').style.display='block';

  const sessionCorrect=sessionSlots.filter(s=>s.correct).length;
  let totalCorrect=0, totalAnswered=0;
  grp.sessions.forEach(s=>s.answers.forEach(a=>{totalAnswered++;if(a.correct)totalCorrect++;}));
  const isComplete=absentIdxs.length===0&&totalAnswered>=TOTAL;

  document.getElementById('res-em').textContent=isComplete?(totalCorrect>=8?'🏆':'🎉'):'⏳';
  document.getElementById('res-sub').textContent=`${classroom} · ${grpLabel}`;
  document.getElementById('res-score').textContent=isComplete?totalCorrect:t('score_today',{correct:sessionCorrect});
  document.getElementById('res-of').textContent=isComplete
    ?t('res_of',{n:TOTAL})
    :t('of_today',{total:sessionSlots.length,tc:totalCorrect,ta:totalAnswered});
  document.getElementById('res-pct').textContent=isComplete
    ?t('pct_complete',{pct:Math.round(totalCorrect/TOTAL*100)})
    :t('pct_waiting',{names:absentIdxs.map(i=>allMembers[i]).join(', ')});

  document.getElementById('res-present').innerHTML=
    presentIdxs.map(i=>`<span class="mem-tag present">✅ ${allMembers[i]}</span>`).join('');
  const aw=document.getElementById('res-absent-wrap');
  if(absentIdxs.length){
    aw.style.display='block';
    document.getElementById('res-absent').innerHTML=
      absentIdxs.map(i=>`<span class="mem-tag absent">⏳ ${allMembers[i]}</span>`).join('');
  } else aw.style.display='none';
}

function backToSetup(){
  document.getElementById('setup-form').style.display='block';
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('result-area').style.display='none';
}
function confirmAbort(){
  if(confirm(t('confirm_abort'))){ clearInterval(timerID); backToSetup(); }
}

// ════════════════════════════
// SUMMARY
// ════════════════════════════
function renderSummary(cls){
  currentSummaryClass=cls;
  document.getElementById('sum-cls1').classList.toggle('active-cls',cls==='ม.4/1');
  document.getElementById('sum-cls2').classList.toggle('active-cls',cls==='ม.4/2');
  const db=loadDB(), clsData=db[cls]||{};
  const el=document.getElementById('summary-content');
  let html='';

  for(let g=1;g<=6;g++){
    const grpLabel=t('group_n',{n:g});
    // try both th/en/fr label
    const grp=clsData[grpLabel]
      ||clsData[I18N.th.group_n.replace('{n}',g)]
      ||clsData[I18N.en.group_n.replace('{n}',g)]
      ||clsData[I18N.fr.group_n.replace('{n}',g)];

    if(!grp||!grp.allMembers||!grp.allMembers.length){
      html+=`<div class="group-card empty"><div class="gc-header">
        <span class="gc-title">${grpLabel}</span>
        <span class="gc-badge badge-empty">${t('badge_empty')}</span>
      </div></div>`;
      continue;
    }

    const N=grp.allMembers.length;
    const memberScores={};
    grp.allMembers.forEach((_,i)=>{ memberScores[i]={correct:0,answered:0}; });
    grp.sessions.forEach(s=>s.answers.forEach(a=>{
      memberScores[a.memberIdx].answered++;
      if(a.correct) memberScores[a.memberIdx].correct++;
    }));
    const memberQCount={};
    grp.allMembers.forEach((_,i)=>{ memberQCount[i]=0; });
    for(let q=0;q<TOTAL;q++) memberQCount[q%N]++;

    const totalCorrect=Object.values(memberScores).reduce((s,m)=>s+m.correct,0);
    const totalAnswered=Object.values(memberScores).reduce((s,m)=>s+m.answered,0);
    const isComplete=totalAnswered>=TOTAL;
    const cardClass=isComplete?'complete':'partial';

    html+=`<div class="group-card ${cardClass}">
      <div class="gc-header">
        <span class="gc-title">${grpLabel}</span>
        <div style="display:flex;gap:.4rem;align-items:center;flex-wrap:wrap">
          <span class="gc-badge ${isComplete?'badge-complete':'badge-partial'}">${t(isComplete?'badge_complete':'badge_partial')}</span>
          ${isComplete?`<span class="gc-badge badge-score">🏆 ${totalCorrect} / ${TOTAL}</span>`:''}
        </div>
      </div>
      <div class="gc-members" style="margin-bottom:.5rem">
        ${grp.allMembers.map((name,i)=>{
          const sc=memberScores[i], need=memberQCount[i], done=sc.answered>=need;
          return `<span class="gc-mem ${done?'done':'pending'}">${done?'✅':'⏳'} ${name} (${sc.correct}/${need})</span>`;
        }).join('')}
      </div>
      ${isComplete
        ?`<div style="padding:.4rem .7rem;background:var(--gp);border-radius:8px;font-size:.82rem;color:var(--g);font-weight:700;text-align:center">
            🏆 ${t('score_total')}: <strong>${totalCorrect} / ${TOTAL}</strong> (${Math.round(totalCorrect/TOTAL*100)}%)
          </div>`
        :`<div style="font-size:.75rem;color:#a05000;padding:.3rem .4rem">
            ⏳ ${t('waiting_for',{names:grp.allMembers.filter((_,i)=>memberScores[i].answered<memberQCount[i]).join(', ')})}
            (${totalAnswered}/${TOTAL} · ${totalCorrect} pts)
          </div>`
      }
    </div>`;
  }
  el.innerHTML=html||`<div class="empty-state">${t('empty_summary',{cls})}</div>`;
}

// ════════════════════════════
// NAV
// ════════════════════════════
function goTab(tab){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  if(tab==='summary') renderSummary(currentSummaryClass);
}
function clearAll(){
  if(confirm(t('confirm_clear'))){ localStorage.removeItem('bio_scores2'); renderSummary(currentSummaryClass); }
}
function shuffle(a){ return a.sort(()=>Math.random()-.5); }

// init
applyI18N();
</script>
